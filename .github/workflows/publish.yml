name: Publish

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Calculate Version
    runs-on: ubuntu-latest
    outputs:
      semVer: ${{ steps.gitversion.outputs.semVer }}
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3

      - name: Display version
        run: echo "Building version ${{ steps.gitversion.outputs.semVer }}"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    env:
      VERSION: ${{ needs.version.outputs.semVer }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build renderer + main
        run: npm run build

      - name: Set version in package.json
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $pkg.version = "$env:VERSION"
          $pkg | ConvertTo-Json -Depth 100 | Set-Content package.json
        shell: pwsh

      - name: Install Python setuptools (for node-gyp on Python 3.12+)
        run: pip install setuptools

      - name: Package Windows installer
        run: npm run package:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ide-windows-${{ needs.version.outputs.semVer }}
          path: release/*Setup*.exe
          if-no-files-found: error
          retention-days: 90

  build-macos-arm64:
    name: Build macOS (ARM64)
    runs-on: macos-latest
    needs: version
    env:
      VERSION: ${{ needs.version.outputs.semVer }}
      # Code signing secrets — optional; builds succeed unsigned without them
      # CSC_LINK: ${{ secrets.CSC_LINK }}
      # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # APPLE_ID: ${{ secrets.APPLE_ID }}
      # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Set version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Generate .icns icon
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16     build/icon-source.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32     build/icon-source.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     build/icon-source.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64     build/icon-source.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   build/icon-source.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256   build/icon-source.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   build/icon-source.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512   build/icon-source.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   build/icon-source.png --out build/icon.iconset/icon_512x512.png
          sips -z 1024 1024 build/icon-source.png --out build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Install Python setuptools (for node-gyp on Python 3.12+)
        run: pip3 install setuptools

      - name: Package macOS app (ARM64)
        run: npm run package:mac -- --arm64

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ide-macos-arm64-dmg-${{ needs.version.outputs.semVer }}
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 90

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ide-macos-arm64-zip-${{ needs.version.outputs.semVer }}
          path: release/*.zip
          if-no-files-found: error
          retention-days: 90

  build-macos-x64:
    name: Build macOS (x64)
    # macos-13 is the last GitHub-hosted Intel runner (may be deprecated in future).
    # If this job fails with a runner error, fallback options are:
    #   - macos-13-xlarge (paid large runner)
    #   - Drop x64 support (Rosetta 2 runs arm64 apps on Intel Macs is incorrect —
    #     Rosetta runs x64 apps on ARM Macs, so Intel users need the x64 build)
    runs-on: macos-13
    needs: version
    env:
      VERSION: ${{ needs.version.outputs.semVer }}
      # Code signing secrets — optional; builds succeed unsigned without them
      # CSC_LINK: ${{ secrets.CSC_LINK }}
      # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      # APPLE_ID: ${{ secrets.APPLE_ID }}
      # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build renderer + main
        run: npm run build

      - name: Set version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Generate .icns icon
        run: |
          mkdir -p build/icon.iconset
          sips -z 16 16     build/icon-source.png --out build/icon.iconset/icon_16x16.png
          sips -z 32 32     build/icon-source.png --out build/icon.iconset/icon_16x16@2x.png
          sips -z 32 32     build/icon-source.png --out build/icon.iconset/icon_32x32.png
          sips -z 64 64     build/icon-source.png --out build/icon.iconset/icon_32x32@2x.png
          sips -z 128 128   build/icon-source.png --out build/icon.iconset/icon_128x128.png
          sips -z 256 256   build/icon-source.png --out build/icon.iconset/icon_128x128@2x.png
          sips -z 256 256   build/icon-source.png --out build/icon.iconset/icon_256x256.png
          sips -z 512 512   build/icon-source.png --out build/icon.iconset/icon_256x256@2x.png
          sips -z 512 512   build/icon-source.png --out build/icon.iconset/icon_512x512.png
          sips -z 1024 1024 build/icon-source.png --out build/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/icon.iconset -o build/icon.icns

      - name: Install Python setuptools (for node-gyp on Python 3.12+)
        run: pip3 install setuptools

      - name: Package macOS app (x64)
        run: npm run package:mac -- --x64

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ide-macos-x64-dmg-${{ needs.version.outputs.semVer }}
          path: release/*.dmg
          if-no-files-found: error
          retention-days: 90

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexus-ide-macos-x64-zip-${{ needs.version.outputs.semVer }}
          path: release/*.zip
          if-no-files-found: error
          retention-days: 90

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, build-windows, build-macos-arm64, build-macos-x64]
    env:
      VERSION: ${{ needs.version.outputs.semVer }}

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: nexus-ide-windows-${{ needs.version.outputs.semVer }}
          path: artifacts/windows

      - name: Download macOS ARM64 DMG
        uses: actions/download-artifact@v4
        with:
          name: nexus-ide-macos-arm64-dmg-${{ needs.version.outputs.semVer }}
          path: artifacts/macos-arm64

      - name: Download macOS ARM64 ZIP
        uses: actions/download-artifact@v4
        with:
          name: nexus-ide-macos-arm64-zip-${{ needs.version.outputs.semVer }}
          path: artifacts/macos-arm64

      - name: Download macOS x64 DMG
        uses: actions/download-artifact@v4
        with:
          name: nexus-ide-macos-x64-dmg-${{ needs.version.outputs.semVer }}
          path: artifacts/macos-x64

      - name: Download macOS x64 ZIP
        uses: actions/download-artifact@v4
        with:
          name: nexus-ide-macos-x64-zip-${{ needs.version.outputs.semVer }}
          path: artifacts/macos-x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.semVer }}
          name: "Nexus IDE v${{ needs.version.outputs.semVer }}"
          body: |
            ## Nexus IDE v${{ needs.version.outputs.semVer }}

            ### Downloads

            | Platform | Architecture | Installer |
            |----------|-------------|-----------|
            | Windows  | x64         | `.exe` installer below |
            | macOS    | Apple Silicon (ARM64) | `.dmg` below |
            | macOS    | Intel (x64) | `.dmg` below |

            > **macOS note:** Builds are unsigned. Right-click → Open to bypass Gatekeeper on first launch.

            > Built from commit ${{ github.sha }}
          files: |
            artifacts/windows/*.exe
            artifacts/macos-arm64/*.dmg
            artifacts/macos-arm64/*.zip
            artifacts/macos-x64/*.dmg
            artifacts/macos-x64/*.zip
          fail_on_unmatched_files: true
          make_latest: true
