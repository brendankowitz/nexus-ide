appId: com.nexus.ide
productName: Nexus IDE
copyright: Copyright © 2025-2026 Nexus IDE Contributors

directories:
  output: release
  buildResources: build

files:
  - dist-electron/**/*
  - dist/**/*

asar: true
asarUnpack:
  - "node_modules/@lydell/node-pty/**"
  - "node_modules/dugite/**"
  - "node_modules/@parcel/watcher/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName} Setup ${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
